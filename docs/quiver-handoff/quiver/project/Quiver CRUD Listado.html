<body>
<div id="root"></div>

<div id="tweaks-panel">

      <option value="expanded">Expandido</option>
      <option value="collapsed">Colapsado</option>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Icons via Lucide ──────────────────────────────────────────────
function Icon({ name, size = 18, color, style = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const iconKey = name.split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join('');
    const iconFn = window.lucide[iconKey];
    if (!iconFn) return;
    ref.current.innerHTML = '';
    const icon = window.lucide.createElement(iconFn);
    if (icon) {
      icon.setAttribute('width', size);
      icon.setAttribute('height', size);
      icon.setAttribute('stroke-width', 1.75);
      if (color) icon.setAttribute('stroke', color);
      ref.current.appendChild(icon);
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', flexShrink: 0, ...style }} />;
}

// ─── Badge ─────────────────────────────────────────────────────────
function Badge({ variant = 'active', children }) {
  const styles = {
    active:   { background: 'var(--brand-50)',   color: 'var(--brand-700)',   border: '1px solid var(--brand-100)' },
    inactive: { background: 'var(--gray-100)',   color: 'var(--gray-600)',    border: '1px solid var(--gray-200)' },
    success:  { background: 'var(--success-50)', color: 'var(--success-500)', border: '1px solid #c3e6d7' },
    danger:   { background: 'var(--danger-50)',  color: 'var(--danger-500)',  border: '1px solid #f5c6c6' },
    warning:  { background: 'var(--warning-50)', color: 'var(--warning-500)', border: '1px solid #f0d9a0' },
    admin:    { background: '#1a1a2e',           color: 'white',              border: 'none' },
  };
  return (
    <span style={{
      ...styles[variant],
      fontSize: 12, fontWeight: 500, lineHeight: 1.4,
      padding: '2px 8px', borderRadius: 4, whiteSpace: 'nowrap',
      display: 'inline-block',
    }}>{children}</span>
  );
}

// ─── Avatar initials ───────────────────────────────────────────────
function Avatar({ name, size = 32 }) {
  const initials = name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: 'var(--brand-50)', color: 'var(--brand-700)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.38, fontWeight: 600, flexShrink: 0,
    }}>{initials}</div>
  );
}

// ─── Toast ─────────────────────────────────────────────────────────
function Toast({ toasts, removeToast }) {
  return (
    <div style={{ position: 'fixed', top: 16, right: 16, zIndex: 9000, display: 'flex', flexDirection: 'column', gap: 8 }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          display: 'flex', alignItems: 'center', gap: 10,
          background: t.type === 'success' ? 'var(--success-50)' : 'var(--danger-50)',
          borderLeft: `3px solid ${t.type === 'success' ? 'var(--success-500)' : 'var(--danger-500)'}`,
          borderRadius: 6, padding: '10px 14px',
          boxShadow: 'var(--shadow-md)', minWidth: 280, maxWidth: 360,
          fontSize: 13, color: 'var(--gray-800)',
          animation: 'slideIn 0.2s ease',
        }}>
          <Icon name={t.type === 'success' ? 'check-circle' : 'x-circle'} size={16} color={t.type === 'success' ? 'var(--success-500)' : 'var(--danger-500)'} />
          <span style={{ flex: 1 }}>{t.message}</span>
          <button onClick={() => removeToast(t.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--gray-500)', padding: 0 }}>
            <Icon name="x" size={14} />
          </button>
        </div>
      ))}
    </div>
  );
}

// ─── Delete Modal ──────────────────────────────────────────────────
function DeleteModal({ item, count, onConfirm, onCancel }) {
  const [deleting, setDeleting] = useState(false);
  const handleConfirm = async () => {
    setDeleting(true);
    await new Promise(r => setTimeout(r, 800));
    onConfirm();
  };
  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 8000,
    }} onClick={e => e.target === e.currentTarget && onCancel()}>
      <div style={{
        background: 'white', borderRadius: 8, padding: 28,
        width: 440, boxShadow: 'var(--shadow-lg)',
      }}>
        <h3 style={{ fontSize: 16, fontWeight: 600, color: 'var(--gray-900)', marginBottom: 12 }}>
          {count ? `Eliminar ${count} registros` : `Eliminar producto`}
        </h3>
        <p style={{ fontSize: 14, color: 'var(--gray-700)', lineHeight: 1.6, marginBottom: 24 }}>
          {count
            ? `¿Estás seguro de que quieres eliminar los ${count} registros seleccionados? Esta acción no se puede deshacer.`
            : `¿Estás seguro de que quieres eliminar "${item}"? Esta acción no se puede deshacer.`
          }
        </p>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
          <button onClick={onCancel} style={btnStyles.secondary}>Cancelar</button>
          <button onClick={handleConfirm} disabled={deleting} style={deleting ? {...btnStyles.danger, opacity: 0.7} : btnStyles.danger}>
            {deleting
              ? <><Spinner /> Eliminando…</>
              : count ? `Eliminar (${count})` : 'Eliminar'
            }
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Spinner ───────────────────────────────────────────────────────
function Spinner({ size = 14 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{ animation: 'spin 0.7s linear infinite' }}>
      <circle cx="12" cy="12" r="10" strokeOpacity="0.25" />
      <path d="M12 2a10 10 0 0 1 10 10" />
    </svg>
  );
}

// ─── Skeleton row ──────────────────────────────────────────────────
function SkeletonRow() {
  const pulse = { animation: 'pulse 1.4s ease-in-out infinite', background: 'var(--gray-100)', borderRadius: 4 };
  return (
    <tr style={{ borderBottom: '1px solid var(--gray-100)' }}>
      <td style={{ padding: '12px 16px' }}><div style={{ ...pulse, width: 16, height: 16, borderRadius: 3 }} /></td>
      <td style={{ padding: '12px 16px' }}><div style={{ ...pulse, width: '60%', height: 13 }} /></td>
      <td style={{ padding: '12px 16px' }}><div style={{ ...pulse, width: '40%', height: 13 }} /></td>
      <td style={{ padding: '12px 16px' }}><div style={{ ...pulse, width: 60, height: 22, borderRadius: 4 }} /></td>
      <td style={{ padding: '12px 16px' }}><div style={{ ...pulse, width: '50%', height: 13 }} /></td>
      <td style={{ padding: '12px 16px' }}><div style={{ ...pulse, width: '40%', height: 13 }} /></td>
      <td style={{ padding: '12px 16px' }}><div style={{ ...pulse, width: 24, height: 24, borderRadius: 4 }} /></td>
    </tr>
  );
}

// ─── Button styles ─────────────────────────────────────────────────
const btnBase = {

const btnStyles = {
  primary:   { ...btnBase, background: 'var(--brand-500)', color: 'white', padding: '8px 16px', border: '1px solid transparent' },
  secondary: { ...btnBase, background: 'white', color: 'var(--gray-800)', padding: '8px 16px', border: '1px solid var(--gray-300)' },
  ghost:     { ...btnBase, background: 'transparent', color: 'var(--gray-700)', padding: '6px 10px', border: '1px solid transparent' },
  danger:    { ...btnBase, background: 'white', color: 'var(--danger-500)', padding: '8px 16px', border: '1px solid var(--danger-500)' },
};

// ─── Data ──────────────────────────────────────────────────────────
const PRODUCTS = [
  { id: 1, name: 'Auriculares Premium BT-900', price: 299.00, status: 'active', category: 'Electrónica', created: '12/03/25' },
  { id: 2, name: 'Mesa de trabajo Scandinavian', price: 549.00, status: 'active', category: 'Hogar', created: '08/02/25' },

  { id: 4, name: 'Cámara Mirrorless Alpha VII', price: 1249.00, status: 'active', category: 'Electrónica', created: '15/01/25' },
  { id: 5, name: 'Mochila Urban Pro 30L', price: 89.00, status: 'active', category: 'Accesorios', created: '03/01/25' },
  { id: 6, name: 'Monitor 4K UltraWide 34"', price: 679.00, status: 'inactive', category: 'Electrónica', created: '28/12/24' },
  { id: 7, name: 'Silla ergonómica Lumbar+', price: 449.00, status: 'active', category: 'Hogar', created: '12/12/24' },
  { id: 8, name: 'Botella termo Acero 750ml', price: 34.00, status: 'active', category: 'Accesorios', created: '01/12/24' },
  { id: 9, name: 'Teclado mecánico TKL', price: 149.00, status: 'inactive', category: 'Electrónica', created: '18/11/24' },
  { id: 10, name: 'Chaqueta softshell Outdoor', price: 199.00, status: 'active', category: 'Deportes', created: '05/11/24' },

const NAV_ITEMS = [
  { group: 'Principal' },
  { icon: 'layout-dashboard', label: 'Dashboard', path: '/admin' },
  { group: 'Catálogo' },
  { icon: 'package', label: 'Productos', path: '/admin/productos', active: true },
  { icon: 'tag', label: 'Categorías', path: '/admin/categorias' },
  { group: 'Usuarios' },

  { icon: 'settings', label: 'Configuración', path: '/admin/config' },

// ─── Sidebar ───────────────────────────────────────────────────────
function Sidebar({ collapsed }) {
  const w = collapsed ? 56 : 240;
  return (
    <aside style={{
      width: w, minWidth: w, height: '100vh', position: 'sticky', top: 0,
      background: 'var(--gray-50)', borderRight: '1px solid var(--gray-200)',
      display: 'flex', flexDirection: 'column', transition: 'width 0.2s',
      overflow: 'hidden', flexShrink: 0,
    }}>
      {/* Logo */}
      <div style={{
        height: 64, display: 'flex', alignItems: 'center',
        padding: collapsed ? '0 16px' : '0 20px',
        borderBottom: '1px solid var(--gray-200)', background: 'white',
        gap: 10, flexShrink: 0,
      }}>
        <div style={{
          width: 28, height: 28, borderRadius: 6,
          background: 'var(--brand-500)', display: 'flex',
          alignItems: 'center', justifyContent: 'center', flexShrink: 0,
        }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 4l5 8 5-8" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        {!collapsed && <span style={{ fontWeight: 600, fontSize: 15, color: 'var(--gray-900)', letterSpacing: '-0.01em' }}>Quiver</span>}
      </div>

      {/* Nav */}
      <nav style={{ flex: 1, padding: '12px 8px', overflowY: 'auto' }}>
        {NAV_ITEMS.map((item, i) => {
          if (item.group) {
            if (collapsed) return null;
            return (
              <div key={i} style={{
                fontSize: 11, fontWeight: 500, color: 'var(--gray-500)',
                textTransform: 'uppercase', letterSpacing: '0.06em',
                padding: '12px 12px 4px',
              }}>{item.group}</div>
            );
          }
          return (
            <div key={i} title={collapsed ? item.label : undefined} style={{
              display: 'flex', alignItems: 'center', gap: 10,
              padding: collapsed ? '8px' : '8px 12px',
              borderRadius: 6, cursor: 'pointer', marginBottom: 1,
              justifyContent: collapsed ? 'center' : 'flex-start',
              background: item.active ? 'var(--brand-50)' : 'transparent',
              color: item.active ? 'var(--brand-700)' : 'var(--gray-700)',
              borderLeft: item.active ? '3px solid var(--brand-500)' : '3px solid transparent',
              fontWeight: item.active ? 500 : 400, fontSize: 14,
              transition: 'background 0.1s',
            }}>
              <Icon name={item.icon} size={18} color={item.active ? 'var(--brand-500)' : 'var(--gray-600)'} />
              {!collapsed && <span>{item.label}</span>}
            </div>
          );
        })}
      </nav>

      {/* Footer */}
      <div style={{
        borderTop: '1px solid var(--gray-200)', padding: collapsed ? '12px 8px' : '12px 16px',
        display: 'flex', alignItems: 'center', gap: 10, justifyContent: collapsed ? 'center' : 'flex-start',
      }}>
        <Avatar name="Ana Martínez" size={30} />
        {!collapsed && (
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--gray-800)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>Ana Martínez</div>
            <div style={{ fontSize: 11, color: 'var(--gray-500)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>ana@empresa.com</div>
          </div>
        )}
        {!collapsed && <Icon name="log-out" size={16} color="var(--gray-400)" style={{ cursor: 'pointer' }} />}
      </div>
    </aside>
  );
}

// ─── Topbar ────────────────────────────────────────────────────────
function Topbar() {
  return (
    <header style={{
      height: 56, background: 'white', borderBottom: '1px solid var(--gray-200)',
      display: 'flex', alignItems: 'center', padding: '0 24px',
      justifyContent: 'space-between', flexShrink: 0, position: 'sticky', top: 0, zIndex: 100,
    }}>
      <nav style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <span style={{ fontSize: 13, color: 'var(--gray-600)' }}>Admin</span>
        <Icon name="chevron-right" size={14} color="var(--gray-400)" />
        <span style={{ fontSize: 13, color: 'var(--gray-900)', fontWeight: 500 }}>Productos</span>
      </nav>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        <span style={{ fontSize: 13, color: 'var(--gray-600)' }}>Ana Martínez</span>
        <Avatar name="Ana Martínez" size={30} />
      </div>
    </header>
  );
}

// ─── Row action menu ───────────────────────────────────────────────
function RowMenu({ row, onDelete, onEdit }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <button onClick={() => setOpen(o => !o)} style={{
        ...btnStyles.ghost, padding: '4px 8px', borderRadius: 4,
        color: open ? 'var(--gray-900)' : 'var(--gray-500)',
      }}>
        <Icon name="more-horizontal" size={16} />
      </button>
      {open && (
        <div style={{
          position: 'absolute', right: 0, top: 32, zIndex: 200,
          background: 'white', border: '1px solid var(--gray-200)',
          borderRadius: 6, boxShadow: 'var(--shadow-md)', minWidth: 140, overflow: 'hidden',
        }}>
          {[
            { label: 'Ver', icon: 'eye' },
            { label: 'Editar', icon: 'pencil', action: onEdit },
          ].map(item => (
            <button key={item.label} onClick={() => { setOpen(false); item.action && item.action(); }} style={{
              width: '100%', display: 'flex', alignItems: 'center', gap: 8,
              padding: '9px 14px', background: 'none', border: 'none', cursor: 'pointer',
              fontSize: 13, color: 'var(--gray-800)', textAlign: 'left',
            }}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--gray-50)'}
            onMouseLeave={e => e.currentTarget.style.background = 'none'}
            >
              <Icon name={item.icon} size={14} color="var(--gray-600)" />
              {item.label}
            </button>
          ))}
          <div style={{ height: 1, background: 'var(--gray-200)', margin: '2px 0' }} />
          <button onClick={() => { setOpen(false); onDelete(); }} style={{
            width: '100%', display: 'flex', alignItems: 'center', gap: 8,
            padding: '9px 14px', background: 'none', border: 'none', cursor: 'pointer',
            fontSize: 13, color: 'var(--danger-500)', textAlign: 'left',
          }}
          onMouseEnter={e => e.currentTarget.style.background = 'var(--danger-50)'}
          onMouseLeave={e => e.currentTarget.style.background = 'none'}
          >
            <Icon name="trash-2" size={14} color="var(--danger-500)" />
            Eliminar
          </button>
        </div>
      )}
    </div>
  );
}

// ─── Filter panel ──────────────────────────────────────────────────
function FilterPanel({ onClose, activeFilters, setActiveFilters }) {
  const [local, setLocal] = useState(activeFilters);
  return (
    <div style={{
      background: 'white', border: '1px solid var(--gray-200)', borderRadius: 8,
      padding: 16, marginBottom: 8, boxShadow: 'var(--shadow-sm)',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
        <span style={{ fontWeight: 600, fontSize: 13, color: 'var(--gray-900)' }}>Filtros</span>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={() => { setLocal({}); }} style={{ ...btnStyles.ghost, fontSize: 12, padding: '4px 8px', color: 'var(--gray-600)' }}>Limpiar todo</button>
          <button onClick={onClose} style={{ ...btnStyles.ghost, padding: '4px 6px' }}><Icon name="x" size={14} /></button>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 }}>
        {[
          { label: 'Estado', options: ['Todos', 'Activo', 'Inactivo'] },
          { label: 'Categoría', options: ['Todas', 'Electrónica', 'Hogar', 'Deportes', 'Accesorios'] },
        ].map(f => (
          <div key={f.label}>
            <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--gray-700)', marginBottom: 6 }}>{f.label}</div>
            <select value={local[f.label] || f.options[0]} onChange={e => setLocal(prev => ({ ...prev, [f.label]: e.target.value }))}
              style={{ width: '100%', padding: '7px 10px', border: '1px solid var(--gray-300)', borderRadius: 4, fontSize: 13, color: 'var(--gray-800)', background: 'white' }}>
              {f.options.map(o => <option key={o}>{o}</option>)}
            </select>
          </div>
        ))}
        <div>
          <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--gray-700)', marginBottom: 6 }}>Fecha de creación</div>
          <div style={{ display: 'flex', gap: 6 }}>
            <input type="date" style={{ flex: 1, padding: '7px 8px', border: '1px solid var(--gray-300)', borderRadius: 4, fontSize: 12, color: 'var(--gray-800)' }} />
            <input type="date" style={{ flex: 1, padding: '7px 8px', border: '1px solid var(--gray-300)', borderRadius: 4, fontSize: 12, color: 'var(--gray-800)' }} />
          </div>
        </div>
      </div>
      <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
        <button onClick={() => { setActiveFilters(local); onClose(); }} style={btnStyles.primary}>Aplicar filtros</button>
      </div>
    </div>
  );
}

// ─── Main CRUD Listing ─────────────────────────────────────────────
function CRUDListing({ tableState, bulkActive, filterVisible, setFilterVisible }) {
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(bulkActive ? [1, 2, 3] : []);
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [deleteTarget, setDeleteTarget] = useState(null); // { name, bulk, count }
  const [toasts, setToasts] = useState([]);
  const [activeFilters, setActiveFilters] = useState({});
  const [page, setPage] = useState(1);

  useEffect(() => { setSelected(bulkActive ? [1, 2, 3] : []); }, [bulkActive]);

  const addToast = (message, type = 'success') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
  };

  const removeToast = id => setToasts(prev => prev.filter(t => t.id !== id));

  const hasActiveFilters = Object.keys(activeFilters).some(k => activeFilters[k] && activeFilters[k] !== 'Todos' && activeFilters[k] !== 'Todas');

  const filteredProducts = PRODUCTS.filter(p =>
    p.name.toLowerCase().includes(search.toLowerCase())
  );

  const toggleSelect = id => {
    setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };
  const toggleAll = () => {
    setSelected(prev => prev.length === filteredProducts.length ? [] : filteredProducts.map(p => p.id));
  };

  const handleSort = col => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  };

  const SortIcon = ({ col }) => (
    <Icon
      name={sortCol === col ? (sortDir === 'asc' ? 'chevron-up' : 'chevron-down') : 'chevrons-up-down'}
      size={12}
      color={sortCol === col ? 'var(--brand-500)' : 'var(--gray-400)'}
    />
  );

  const cols = ['Nombre', 'Precio', 'Estado', 'Categoría', 'Creado'];

  return (
    <>
      <Toast toasts={toasts} removeToast={removeToast} />
      {deleteTarget && (
        <DeleteModal
          item={deleteTarget.name}
          count={deleteTarget.bulk ? deleteTarget.count : null}
          onConfirm={() => {
            setDeleteTarget(null);
            setSelected([]);
            addToast(deleteTarget.bulk
              ? `${deleteTarget.count} productos eliminados correctamente.`
              : `"${deleteTarget.name}" eliminado correctamente.`
            );
          }}
          onCancel={() => setDeleteTarget(null)}
        />
      )}

      {/* Page header */}
      <div style={{ marginBottom: 20 }}>
        <h1 style={{ fontSize: 24, fontWeight: 600, color: 'var(--gray-900)', lineHeight: 1.3 }}>Productos</h1>
        <p style={{ fontSize: 13, color: 'var(--gray-600)', marginTop: 2 }}>
          {tableState === 'data' ? '1.432 registros' : tableState === 'loading' ? 'Cargando…' : 'Sin registros'}
        </p>
      </div>

      {/* Toolbar */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8,
        background: 'white', border: '1px solid var(--gray-200)',
        borderRadius: 8, padding: '10px 12px', boxShadow: 'var(--shadow-sm)',
      }}>
        {/* Search */}
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8, maxWidth: 320 }}>
          <Icon name="search" size={15} color="var(--gray-400)" />
          <input
            type="text" placeholder="Buscar productos…"
            value={search} onChange={e => setSearch(e.target.value)}
            style={{
              flex: 1, border: 'none', outline: 'none', fontSize: 13,
              color: 'var(--gray-800)', background: 'transparent',
            }}
          />
          {search && (
            <button onClick={() => setSearch('')} style={{ ...btnStyles.ghost, padding: 2 }}>
              <Icon name="x" size={13} />
            </button>
          )}
        </div>

        <div style={{ width: 1, height: 24, background: 'var(--gray-200)' }} />

        <button
          onClick={() => setFilterVisible(v => !v)}
          style={{
            ...btnStyles.ghost,
            color: filterVisible || hasActiveFilters ? 'var(--brand-600)' : 'var(--gray-700)',
            background: filterVisible || hasActiveFilters ? 'var(--brand-50)' : 'transparent',
          }}
        >
          <Icon name="sliders-horizontal" size={15} />
          Filtros
          {hasActiveFilters && (
            <span style={{
              background: 'var(--brand-500)', color: 'white',
              borderRadius: '50%', width: 16, height: 16, fontSize: 10,
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 600,
            }}>
              {Object.keys(activeFilters).filter(k => activeFilters[k] && activeFilters[k] !== 'Todos' && activeFilters[k] !== 'Todas').length}
            </span>
          )}
        </button>

        <button style={btnStyles.ghost}>
          <Icon name="columns-3" size={15} />
          Columnas
        </button>

        <div style={{ marginLeft: 'auto' }}>
          <button style={btnStyles.primary}>
            <Icon name="plus" size={15} />
            Crear producto
          </button>
        </div>
      </div>

      {/* Active filters strip */}
      {hasActiveFilters && !filterVisible && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
          {Object.entries(activeFilters)
            .filter(([, v]) => v && v !== 'Todos' && v !== 'Todas')
            .map(([k, v]) => (
              <div key={k} style={{
                display: 'flex', alignItems: 'center', gap: 6,
                background: 'var(--brand-50)', border: '1px solid var(--brand-100)',
                borderRadius: 4, padding: '3px 8px', fontSize: 12, color: 'var(--brand-700)',
              }}>
                <span>{k}: {v}</span>
                <button onClick={() => setActiveFilters(prev => { const n = {...prev}; delete n[k]; return n; })}
                  style={{ ...btnStyles.ghost, padding: 0, color: 'var(--brand-500)' }}>
                  <Icon name="x" size={11} />
                </button>
              </div>
            ))}
          <button onClick={() => setActiveFilters({})}
            style={{ ...btnStyles.ghost, fontSize: 12, padding: '2px 6px', color: 'var(--gray-600)' }}>
            Limpiar todo
          </button>
        </div>
      )}

      {/* Filter panel */}
      {filterVisible && (
        <FilterPanel
          onClose={() => setFilterVisible(false)}
          activeFilters={activeFilters}
          setActiveFilters={setActiveFilters}
        />
      )}

      {/* Bulk action bar */}
      {selected.length > 0 && (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 12,
          background: 'var(--brand-50)', borderTop: '2px solid var(--brand-500)',
          padding: '10px 16px', borderRadius: '0 0 6px 6px', marginBottom: -1,
        }}>
          <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--brand-700)', flex: 1 }}>
            {selected.length} seleccionado{selected.length !== 1 ? 's' : ''}
          </span>
          <button onClick={() => setSelected([])} style={{ ...btnStyles.secondary, fontSize: 12, padding: '5px 12px' }}>Cancelar</button>
          <button
            onClick={() => setDeleteTarget({ bulk: true, count: selected.length })}
            style={{ ...btnStyles.ghost, fontSize: 12, padding: '5px 12px', color: 'var(--danger-500)', border: '1px solid var(--danger-500)' }}
          >
            <Icon name="trash-2" size={14} color="var(--danger-500)" />
            Eliminar ({selected.length})
          </button>
        </div>
      )}

      {/* Table */}
      <div style={{
        background: 'white', border: '1px solid var(--gray-200)',
        borderRadius: selected.length > 0 ? '0 0 8px 8px' : 8,
        overflow: 'hidden', boxShadow: 'var(--shadow-sm)', marginBottom: 8,
      }}>
        {tableState === 'loading' ? (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ background: 'var(--gray-50)', borderBottom: '1px solid var(--gray-200)' }}>
                {['', ...cols, ''].map((c, i) => (
                  <th key={i} style={{ padding: '10px 16px', textAlign: 'left', fontSize: 13, fontWeight: 600, color: 'var(--gray-700)' }}>{c}</th>
                ))}
              </tr>
            </thead>
            <tbody>{Array.from({length: 8}).map((_, i) => <SkeletonRow key={i} />)}</tbody>
          </table>
        ) : tableState === 'empty' ? (
          <div style={{ padding: '64px 24px', textAlign: 'center' }}>
            <Icon name="package" size={40} color="var(--gray-300)" style={{ justifyContent: 'center', marginBottom: 12 }} />
            <div style={{ fontSize: 15, fontWeight: 500, color: 'var(--gray-700)', marginBottom: 6 }}>No hay registros todavía</div>
            <div style={{ fontSize: 13, color: 'var(--gray-500)', marginBottom: 20 }}>Crea el primer producto para empezar.</div>
            <button style={btnStyles.primary}><Icon name="plus" size={15} />Crear primer producto</button>
          </div>
        ) : tableState === 'empty-filtered' ? (
          <div style={{ padding: '64px 24px', textAlign: 'center' }}>
            <Icon name="search" size={40} color="var(--gray-300)" style={{ justifyContent: 'center', marginBottom: 12 }} />
            <div style={{ fontSize: 15, fontWeight: 500, color: 'var(--gray-700)', marginBottom: 6 }}>No se encontraron resultados</div>
            <div style={{ fontSize: 13, color: 'var(--gray-500)', marginBottom: 20 }}>Prueba con otros términos o limpia los filtros.</div>
            <button style={btnStyles.secondary}>Limpiar filtros</button>
          </div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ background: 'var(--gray-50)', borderBottom: '1px solid var(--gray-200)' }}>
                <th style={{ padding: '10px 16px', width: 40 }}>
                  <input type="checkbox"
                    checked={selected.length === filteredProducts.length && filteredProducts.length > 0}
                    onChange={toggleAll}
                    style={{ accentColor: 'var(--brand-500)', cursor: 'pointer' }}
                  />
                </th>
                {cols.map(col => (
                  <th key={col} onClick={() => handleSort(col)} style={{
                    padding: '10px 16px', textAlign: 'left', fontSize: 13,
                    fontWeight: 600, color: 'var(--gray-700)', cursor: 'pointer',
                    userSelect: 'none', whiteSpace: 'nowrap',
                  }}>
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                      {col} <SortIcon col={col} />
                    </span>
                  </th>
                ))}
                <th style={{ padding: '10px 16px', width: 48 }} />
              </tr>
            </thead>
            <tbody>
              {filteredProducts.map((product, i) => {
                const isSelected = selected.includes(product.id);
                return (
                  <tr key={product.id} style={{
                    borderBottom: i < filteredProducts.length - 1 ? '1px solid var(--gray-100)' : 'none',
                    background: isSelected ? 'var(--brand-50)' : 'white',
                    borderLeft: isSelected ? '3px solid var(--brand-500)' : '3px solid transparent',
                    transition: 'background 0.1s',
                  }}
                  onMouseEnter={e => { if (!isSelected) e.currentTarget.style.background = 'var(--gray-50)'; }}
                  onMouseLeave={e => { if (!isSelected) e.currentTarget.style.background = 'white'; }}
                  >
                    <td style={{ padding: '12px 16px' }}>
                      <input type="checkbox" checked={isSelected} onChange={() => toggleSelect(product.id)}
                        style={{ accentColor: 'var(--brand-500)', cursor: 'pointer' }} />
                    </td>
                    <td style={{ padding: '12px 16px' }}>
                      <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--gray-900)' }}>{product.name}</div>
                      <div style={{ fontSize: 12, color: 'var(--gray-500)', marginTop: 1 }}>ID-{String(product.id).padStart(4, '0')}</div>
                    </td>
                    <td style={{ padding: '12px 16px', fontSize: 14, color: 'var(--gray-800)', fontVariantNumeric: 'tabular-nums' }}>
                      € {product.price.toFixed(2).replace('.', ',')}
                    </td>
                    <td style={{ padding: '12px 16px' }}>
                      <Badge variant={product.status === 'active' ? 'success' : 'inactive'}>
                        {product.status === 'active' ? 'Activo' : 'Inactivo'}
                      </Badge>
                    </td>
                    <td style={{ padding: '12px 16px', fontSize: 13, color: 'var(--gray-700)' }}>{product.category}</td>
                    <td style={{ padding: '12px 16px', fontSize: 13, color: 'var(--gray-600)' }}>{product.created}</td>
                    <td style={{ padding: '12px 16px', textAlign: 'right' }}>
                      <RowMenu
                        row={product}
                        onDelete={() => setDeleteTarget({ name: product.name })}
                        onEdit={() => addToast(`Editando "${product.name}"…`, 'success')}
                      />
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {/* Pagination */}
      {tableState === 'data' && (
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '10px 2px', fontSize: 13, color: 'var(--gray-600)',
        }}>
          <span>Mostrando 1–10 de 1.432</span>
          <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
            <button style={{ ...btnStyles.ghost, padding: '5px 8px' }}><Icon name="chevron-left" size={14} /></button>
            {[1, 2, 3, '…', 58].map((p, i) => (
              <button key={i} onClick={() => typeof p === 'number' && setPage(p)} style={{
                ...btnStyles.ghost, padding: '5px 10px', minWidth: 32,
                background: p === page ? 'var(--brand-50)' : 'transparent',
                color: p === page ? 'var(--brand-700)' : typeof p === 'string' ? 'var(--gray-400)' : 'var(--gray-700)',
                fontWeight: p === page ? 500 : 400,
                cursor: typeof p === 'string' ? 'default' : 'pointer',
              }}>{p}</button>
            ))}
            <button style={{ ...btnStyles.ghost, padding: '5px 8px' }}><Icon name="chevron-right" size={14} /></button>
            <div style={{ width: 1, height: 20, background: 'var(--gray-200)', margin: '0 4px' }} />
            <select style={{
              fontSize: 13, border: '1px solid var(--gray-300)', borderRadius: 4,
              padding: '4px 8px', color: 'var(--gray-800)', background: 'white',
            }}>
              <option>10</option><option>25</option><option>50</option>
            </select>
          </div>
        </div>
      )}
    </>
  );
}

// ─── App ───────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState({
    tableState: 'data',
    bulkActive: false,
    filterVisible: false,
    sidebarCollapsed: false,
  });
  const [filterVisible, setFilterVisible] = useState(false);

  // Tweaks panel wiring
  useEffect(() => {
    const panel = document.getElementById('tweaks-panel');
    const ids = ['tweak-state', 'tweak-bulk', 'tweak-filters', 'tweak-sidebar'];
    const handlers = ids.map(id => {
      const el = document.getElementById(id);
      const fn = () => {
        setTweaks({
          tableState: document.getElementById('tweak-state').value,
          bulkActive: document.getElementById('tweak-bulk').value === 'on',
          filterVisible: document.getElementById('tweak-filters').value === 'on',
          sidebarCollapsed: document.getElementById('tweak-sidebar').value === 'collapsed',
        });
        if (document.getElementById('tweak-filters').value === 'on') setFilterVisible(true);
        else setFilterVisible(false);
      };
      el.addEventListener('change', fn);
      return { el, fn };
    });

    const listener = e => {
      if (e.data?.type === '__activate_edit_mode') panel.classList.add('open');
      if (e.data?.type === '__deactivate_edit_mode') panel.classList.remove('open');
    };
    window.addEventListener('message', listener);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    return () => {
      window.removeEventListener('message', listener);
      handlers.forEach(({ el, fn }) => el.removeEventListener('change', fn));
    };
  }, []);

  useEffect(() => {
    if (tweaks.filterVisible) setFilterVisible(true);
  }, [tweaks.filterVisible]);

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar collapsed={tweaks.sidebarCollapsed} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <Topbar />
        <main style={{ flex: 1, overflowY: 'auto', padding: 24 }}>
          <div style={{ maxWidth: 1200 }}>
            <CRUDListing
              tableState={tweaks.tableState}
              bulkActive={tweaks.bulkActive}
              filterVisible={filterVisible}
              setFilterVisible={setFilterVisible}
            />
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

input[type="checkbox"] { width: 15px; height: 15px; }
